name: E2E Tests

# Run E2E tests after every push / PR to main or develop branches,
# and allow manual triggers from the GitHub Actions UI.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   E2E_EMAIL    — email address for the throwaway test account
#   E2E_PASSWORD — password for that account (≥ 8 chars)
#
# Without these secrets the "Create E2E test user" and "Run E2E tests"
# steps will fail with a clear error message — not silently.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Create .env used by docker compose ────────────────────────────────
      # The base compose.yml requires an .env file (env_file: .env).
      # We generate a minimal one here so the backend and db containers start.
      - name: Create .env for CI stack
        run: |
          cat > .env << 'ENVEOF'
          POSTGRES_DB=spellwright
          POSTGRES_USER=testuser
          POSTGRES_PASSWORD=ci_testpass_e2e
          DJANGO_SECRET_KEY=ci-only-e2e-secret-key-not-for-production
          CORS_ALLOWED_ORIGINS=http://localhost
          ENVEOF

      # ── 3. Create the external Postgres volume expected by compose.yml ───────
      # compose.yml declares postgres_data as external; we create it upfront so
      # docker compose up does not error with "volume not found".
      - name: Create external Postgres volume
        run: docker volume create dndoptimizer_postgres_data

      # ── 4. Build images and start all services ───────────────────────────────
      # compose.ci.yml adds an explicit container_name to the backend service so
      # that nginx.conf can resolve "spellwright_backend_1" via Docker DNS.
      - name: Build and start the full stack
        run: docker compose -f compose.yml -f compose.ci.yml up -d --build

      # ── 5. Wait until the Django API is reachable ────────────────────────────
      # /api/spells/spells/ returns 401 (not found) when the backend is up but
      # auth is required — that's all we need to confirm it's responding.
      - name: Wait for the API to be reachable
        run: |
          echo "Waiting for the API…"
          timeout 90 bash -c \
            'until curl -s -o /dev/null -w "%{http_code}" http://localhost/api/spells/spells/ \
              | grep -qE "^(200|401)"; \
             do echo "  still waiting…"; sleep 4; done'
          echo "API is responding."

      # ── 6. Migrations ────────────────────────────────────────────────────────
      - name: Run database migrations
        run: docker compose exec -T backend python manage.py migrate --no-input

      # ── 7. Seed spell data ───────────────────────────────────────────────────
      # Seeds spells.json + TCoE_spells.json from backend/data/ so the spell
      # library tests (search, card navigation, etc.) have real data to work with.
      - name: Seed spell library
        run: docker compose exec -T backend python manage.py seed_spells --all

      # ── 8. Create the E2E test user ──────────────────────────────────────────
      # Credentials are read from GitHub Secrets → passed via -e flags → read
      # inside the Python script via os.environ.  This avoids embedding secret
      # values in the shell script string while keeping them masked in logs.
      - name: Create E2E test user
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          docker compose exec -T \
            -e "E2E_EMAIL=$E2E_EMAIL" \
            -e "E2E_PASSWORD=$E2E_PASSWORD" \
            backend python manage.py shell -c "
          import os, sys
          from django.contrib.auth import get_user_model
          User = get_user_model()
          email    = os.environ.get('E2E_EMAIL', '').strip()
          password = os.environ.get('E2E_PASSWORD', '').strip()
          if not email or not password:
              print('ERROR: E2E_EMAIL/E2E_PASSWORD secrets are not configured.', file=sys.stderr)
              print('Add them under repo Settings → Secrets → Actions.', file=sys.stderr)
              sys.exit(1)
          user, created = User.objects.get_or_create(
              email=email,
              defaults={'username': email},
          )
          user.set_password(password)
          user.save()
          print('E2E user ready:', email, '(created=' + str(created) + ')')
          "

      # ── 9. Install Node 20 ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # ── 10. Install Playwright + Chromium browser binary ─────────────────────
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      # ── 11. Run the E2E test suite ───────────────────────────────────────────
      - name: Run Playwright E2E tests
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: cd frontend && npx playwright test

      # ── 12. Upload the HTML test report as a workflow artifact ───────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 14

      # ── 13. Dump last 100 lines of each container's logs on failure ───────────
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.yml -f compose.ci.yml logs --tail=100

      # ── 14. Always tear down the stack ───────────────────────────────────────
      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yml -f compose.ci.yml down -v
