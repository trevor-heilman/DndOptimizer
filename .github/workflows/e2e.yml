name: E2E Tests

# Run E2E tests after every push / PR to main or develop branches,
# and allow manual triggers from the GitHub Actions UI.
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   E2E_EMAIL    — email address for the throwaway test account
#   E2E_PASSWORD — password for that account (≥ 8 chars)
#
# Without these secrets the "Create E2E test user" and "Run E2E tests"
# steps will fail with a clear error message — not silently.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Create .env used by docker compose ────────────────────────────────
      # The base compose.yml requires an .env file (env_file: .env).
      # We generate a minimal one here so the backend and db containers start.
      # printf is used instead of heredoc to avoid whitespace ambiguity.
      - name: Create .env for CI stack
        run: |
          printf '%s\n' \
            'POSTGRES_DB=spellwright' \
            'POSTGRES_USER=testuser' \
            'POSTGRES_PASSWORD=ci_testpass_e2e' \
            'DJANGO_SECRET_KEY=ci-only-e2e-secret-key-not-for-production' \
            'CORS_ALLOWED_ORIGINS=http://localhost' \
            > .env
          echo ".env written:"
          cat .env

      # ── 3. Create the external Postgres volume expected by compose.yml ───────
      # compose.yml declares postgres_data as external; we create it upfront so
      # docker compose up does not error with "volume not found".
      - name: Create external Postgres volume
        run: docker volume create dndoptimizer_postgres_data

      # ── 4. Validate merged compose configuration ─────────────────────────────
      # Catches YAML parse errors and missing variable substitutions early,
      # before attempting to pull images or build anything.
      - name: Validate compose configuration
        run: docker compose -f compose.yml -f compose.ci.yml config --quiet

      # ── 5a. Build backend image ──────────────────────────────────────────────
      # Split builds so that a failure is clearly attributed to one service.
      # --progress=plain emits a full layer-by-layer log (visible in step output).
      - name: Build backend image
        run: docker compose -f compose.yml -f compose.ci.yml build --progress=plain backend

      # ── 5b. Build frontend image ─────────────────────────────────────────────
      - name: Build frontend image
        run: docker compose -f compose.yml -f compose.ci.yml build --progress=plain frontend

      # ── 6. Start the full stack ───────────────────────────────────────────────
      # compose.ci.yml adds an explicit container_name to the backend service so
      # that nginx.conf can resolve "spellwright_backend_1" via Docker DNS.
      # --wait blocks until all services with healthchecks report healthy.
      - name: Start the full stack
        run: docker compose -f compose.yml -f compose.ci.yml up -d --wait --no-build

      # ── 7. Migrations ────────────────────────────────────────────────────────
      # Run BEFORE the API health check: on a fresh DB, Django returns 500 for
      # every request because auth tables don't exist yet, so the 200/401 health
      # check below would time out.  docker compose up --wait (step 6) now blocks
      # until the backend healthcheck (gunicorn port 8000) reports healthy, so
      # gunicorn is definitely accepting connections before this exec runs.
      - name: Run database migrations
        run: docker compose exec -T backend python manage.py migrate --no-input

      # ── 8. Seed spell data ───────────────────────────────────────────────────
      # Seeds spells.json + TCoE_spells.json from backend/data/ so the spell
      # library tests (search, card navigation, etc.) have real data to work with.
      - name: Seed spell library
        run: docker compose exec -T backend python manage.py seed_spells --all

      # ── 9. Wait until the Django API is reachable ────────────────────────────
      # /api/spells/spells/ returns 401 when the backend is up, auth is required,
      # and migrations have run — that's the green light for Playwright.
      - name: Wait for the API to be reachable
        run: |
          echo "Waiting for the API..."
          timeout 60 bash -c \
            'until curl -s -o /dev/null -w "%{http_code}" http://localhost/api/spells/spells/ \
              | grep -qE "^(200|401)"; \
             do echo "  still waiting..."; sleep 4; done'
          echo "API is responding."

      # ── 10. Create the E2E test user ─────────────────────────────────────────
      # Uses a dedicated management command (users/management/commands/create_e2e_user.py)
      # to avoid fragile multi-line bash heredoc quoting.  Credentials are
      # injected via -e KEY passthrough from the step's env: block.
      - name: Create E2E test user
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          docker compose exec -T \
            -e E2E_EMAIL \
            -e E2E_PASSWORD \
            backend python manage.py create_e2e_user

      # ── 11. Install Node 20 ──────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # ── 12. Install Playwright + Chromium browser binary ─────────────────────
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      # ── 13. Run the E2E test suite ───────────────────────────────────────────
      - name: Run Playwright E2E tests
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: cd frontend && npx playwright test

      # ── 14. Upload the HTML test report as a workflow artifact ───────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 14

      # ── 15. Dump last 100 lines of each container's logs on failure ───────────
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f compose.yml -f compose.ci.yml logs --tail=100

      # ── 16. Always tear down the stack ───────────────────────────────────────
      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yml -f compose.ci.yml down -v
