version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dndoptimizer
      POSTGRES_USER: dnduser
      POSTGRES_PASSWORD: dndpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: dndoptimizer
      POSTGRES_USER: dnduser
      POSTGRES_PASSWORD: dndpass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api

volumes:
  postgres_data:
